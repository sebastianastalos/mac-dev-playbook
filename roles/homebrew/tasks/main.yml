---
- name: Check if Homebrew is installed
  ansible.builtin.command: which brew
  register: homebrew_brew_check
  changed_when: false
  failed_when: false

- name: Install Homebrew
  ansible.builtin.shell: |
    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: homebrew_brew_check.rc != 0
  changed_when: homebrew_brew_check.rc != 0

- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true

- name: Trust Homebrew taps
  ansible.builtin.command: brew trust {{ item }}
  loop: "{{ homebrew_taps }}"
  changed_when: false
  failed_when: false

- name: Add Homebrew taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_taps }}"

- name: Install Homebrew formulae
  community.general.homebrew:
    name: "{{ homebrew_formulae }}"
    state: present

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_casks }}"
  loop_control:
    label: "{{ item }}"
  register: homebrew_cask_result
  failed_when: homebrew_cask_result.failed and 'already an App at' not in (homebrew_cask_result.msg | default(''))
