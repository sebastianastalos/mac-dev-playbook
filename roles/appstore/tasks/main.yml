---
- name: Install mas (Mac App Store CLI)
  community.general.homebrew:
    name: mas
    state: present

- name: Install App Store apps
  ansible.builtin.command: "mas install {{ item.id }}"
  register: appstore_mas_install
  changed_when: "'already installed' not in appstore_mas_install.stdout"
  loop: "{{ mas_apps }}"
  loop_control:
    label: "{{ item.name }} ({{ item.id }})"
