---
- name: Create cmux config directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/cmux"
    state: directory
    mode: "0755"

- name: Deploy cmux config
  ansible.builtin.copy:
    src: cmux.json
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/cmux/cmux.json"
    mode: "0644"

- name: Create Ghostty config directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/ghostty"
    state: directory
    mode: "0755"

- name: Configure Ghostty
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/ghostty/config"
    marker: "# {mark} ANSIBLE MANAGED"
    create: true
    mode: "0644"
    block: |
      font-family = JetBrainsMono Nerd Font
      font-size = 14
      background-opacity = 0.92
      background-blur-radius = 20
      window-show-tab-bar = false

- name: Throttle Homebrew auto-update to once a week
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    line: "export HOMEBREW_AUTO_UPDATE_SECS=604800"
    create: true
    mode: "0644"

- name: Add cmux branch status hook
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED CMUX HOOKS"
    block: |
      _cmux_update_branch() {
        if command -v cmux &>/dev/null && git rev-parse --git-dir &>/dev/null 2>&1; then
          local branch=$(git branch --show-current 2>/dev/null)
          if [[ -n "$branch" ]]; then
            cmux set-status branch "$branch" --icon "arrow.triangle.branch" 2>/dev/null
          else
            cmux clear-status branch 2>/dev/null
          fi
        fi
      }
      precmd_functions+=(_cmux_update_branch)

- name: Add shell aliases
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED ALIASES"
    block: |
      # Git
      alias gs='git status'

      # Docker
      alias dps='docker ps -a'
      alias dlogs='docker logs'
      alias dinspect='docker inspect'

      # Claude Code
      alias cld='claude'

      # Terminal
      alias cl='clear'

- name: Show hidden files in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: "{{ macos_show_hidden_files }}"
  notify: Restart Finder

- name: Minimize windows into application icon
  community.general.osx_defaults:
    domain: com.apple.dock
    key: minimize-to-application
    type: bool
    value: "{{ macos_minimize_to_application }}"
  notify: Restart Dock

- name: Dock - hide suggested and recent apps
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-recents
    type: bool
    value: false
  notify: Restart Dock

- name: Set git user name
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ git_user_name }}"

- name: Set git user email
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ git_user_email }}"

- name: Set git default branch to main
  community.general.git_config:
    name: init.defaultBranch
    scope: global
    value: main

- name: Set git pull to rebase
  community.general.git_config:
    name: pull.rebase
    scope: global
    value: "true"

- name: Copy global gitignore
  ansible.builtin.copy:
    src: gitignore_global
    dest: "{{ ansible_facts['env']['HOME'] }}/.gitignore"
    mode: "0644"

- name: Set global gitignore in git config
  community.general.git_config:
    name: core.excludesfile
    scope: global
    value: "{{ ansible_facts['env']['HOME'] }}/.gitignore"

- name: Create screenshots folder
  ansible.builtin.file:
    path: "{{ macos_screenshots_folder }}"
    state: directory
    mode: "0755"

- name: Set screenshots save location
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: location
    type: string
    value: "{{ macos_screenshots_folder }}"

- name: Finder - show all file extensions
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true
  notify: Restart Finder

- name: Finder - show status bar
  community.general.osx_defaults:
    domain: com.apple.finder
    key: ShowStatusBar
    type: bool
    value: true
  notify: Restart Finder

- name: Finder - use column view by default
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: clmv
  notify: Restart Finder

- name: Finder - disable extension change warning
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXEnableExtensionChangeWarning
    type: bool
    value: false
  notify: Restart Finder

- name: Finder - no .DS_Store on network volumes
  community.general.osx_defaults:
    domain: com.apple.desktopservices
    key: DSDontWriteNetworkStores
    type: bool
    value: true

- name: Keyboard - disable press-and-hold in favour of key repeat
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false

- name: Keyboard - set fast initial key repeat
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 20

- name: Keyboard - set fast key repeat rate
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 1

- name: Generate SSH keypair if absent
  community.crypto.openssh_keypair:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/id_ed25519"
    type: ed25519
    comment: "{{ git_user_email }}"
    state: present
