---
# Homebrew taps (needed before cask installs)
homebrew_taps:
  - manaflow-ai/cmux

# Homebrew casks (GUI apps)
homebrew_casks:
  - obsidian
  - 1password
  - claude
  - visual-studio-code
  - cmux
  - docker
  - tailscale
  - font-jetbrains-mono-nerd-font
  - alfred
  - hiddenbar
  - stats

# Mac App Store apps
mas_apps:
  - { id: 937984704, name: "Amphetamine" }

# Homebrew formulae (CLI tools)
homebrew_formulae:
  - node
  - gh
  - dockutil

# VS Code extensions
vscode_extensions:
  - 4ops.terraform
  - anthropic.claude-code
  - bierner.markdown-yaml-preamble
  - emmanuelbeziat.vscode-great-icons
  - github.github-vscode-theme
  - github.vscode-pull-request-github
  - mhutchie.git-graph
  - miguelsolorio.fluent-icons
  - ms-vscode-remote.remote-containers
  - ms-vscode-remote.remote-ssh
  - ms-vscode-remote.remote-ssh-edit
  - ms-vscode.remote-explorer
  - narasimapandiyan.jetbrainsmono
  - nerudevs.jellyfish-dark
  - openai.chatgpt
  - pkief.material-icon-theme
  - pranjalkumar.minimal-kiwi
  - redhat.vscode-yaml
  - usernamehw.errorlens
  - vscode-icons-team.vscode-icons
  - wayou.vscode-todo-highlight

# npm global packages
npm_global_packages:
  - "@anthropic-ai/claude-code"

# Git identity
git_user_name: "sebastianastalos"
git_user_email: "96073170+sebastianastalos@users.noreply.github.com"

# macOS settings
macos_show_hidden_files: true
macos_minimize_to_application: true
macos_screenshots_folder: "{{ ansible_facts['env']['HOME'] }}/Screenshots"

# Apps to open at login
login_items:
  - name: Alfred 5
    path: /Applications/Alfred 5.app
  - name: Amphetamine
    path: /Applications/Amphetamine.app
  - name: Stats
    path: /Applications/Stats.app
  - name: Hidden Bar
    path: /Applications/Hidden Bar.app

# Dock items (pinned apps in order)
dock_items:
  - name: Obsidian
    path: /Applications/Obsidian.app
  - name: Visual Studio Code
    path: /Applications/Visual Studio Code.app
  - name: Claude
    path: /Applications/Claude.app
  - name: 1Password
    path: /Applications/1Password.app
  - name: cmux
    path: /Applications/cmux.app
  - name: Messages
    path: /System/Applications/Messages.app
  - name: Calendar
    path: /System/Applications/Calendar.app
